<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="utf-8" />
  <title>Formulário</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/form.css') }}" />
</head>

<body>
  <div class="container">
    <div class="header">
      <img src="{{ url_for('static', filename='images/celular/tela1/preencha_dados.png') }}" alt="">
    </div>
    <form id="userForm" action="post" method="POST" class="content" novalidate>
      <label for="name">Nome</label>
      <input type="text" id="name" name="name" autocomplete="name" required>
      <span class="field-error" id="nameError"></span>

      <label for="age">Idade</label>
      <input type="number" id="age" name="age" min="18" inputmode="numeric" required>
      <span class="field-error" id="ageError"></span>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" autocomplete="email" required>
      <span class="field-error" id="emailError"></span>

      <label for="cpf">CPF</label>
      <input type="text" id="cpf" name="cpf" inputmode="numeric" maxlength="14" placeholder="000.000.000-00" required>
      <span class="field-error" id="cpfError"></span>

      <div class="checkbox">
        <input type="checkbox" name="terms" id="terms" required>
        <label for="terms">Li e concordo com os <span>termos de uso.</span></label>
      </div>
      <span class="field-error" id="termsError"></span>

      <p id="formStatus" class="form-status"></p>
    </form>

    <div class="button_container">
      <img id="btnSubmit" src="{{ url_for('static', filename='images/celular/tela1/bt_enviar.png') }}" alt="Enviar">
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/crypt/util.js') }}"></script>
  <script src="{{ url_for('static', filename='js/crypt/aes_encryption.js') }}"></script>
  <script src="{{ url_for('static', filename='js/crypt/rsa_encryption.js') }}"></script>
  <script src="{{ url_for('static', filename='js/crypt/db_encryption.js') }}"></script>
  <script src="{{ url_for('static', filename='js/form_page.js') }}"></script>
</body>

</html>
